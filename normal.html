<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calc-Normal</title>
    <link rel="stylesheet" href="./CSS/normal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&display=swap');
    </style>
</head>

<body>
    <div class="normal-calc">
        <nav class="navbar">
            <div class="navbar-title">Normal Calculator</div>
            <div class="hamburger-btn" id="hamburgerBtn">
                <i class="fas fa-bars"></i>
            </div>
        </nav>

        <div class="hero">
            <div class="card">
                <div class="display">
                    <div class="line line-top" id="lineTop"></div>
                    <div class="line line-bottom-wrap">
                        <span class="line line-bottom" id="lineBottom">0</span><span class="cursor" id="cursor">|</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="calc-btn">
            <button id="cleare" class="operation">AC</button>
            <button id="delete" class="operation">⌫</button>
            <button class="operation" data-value="%">%</button>
            <button class="operation" data-value="/">/</button>

            <button class="digit" data-value="7">7</button>
            <button class="digit" data-value="8">8</button>
            <button class="digit" data-value="9">9</button>
            <button class="operation" data-value="*">x</button>

            <button class="digit" data-value="4">4</button>
            <button class="digit" data-value="5">5</button>
            <button class="digit" data-value="6">6</button>
            <button class="operation" data-value="-">-</button>

            <button class="digit" data-value="1">1</button>
            <button class="digit" data-value="2">2</button>
            <button class="digit" data-value="3">3</button>
            <button class="operation" data-value="+">+</button>

            <button class="digit" data-value="0">0</button>
            <button class="digit" data-value=".">.</button>
            <button class="digit" id="bracket">( )</button>
            <button class="operation" id="equal">=</button>
        </div>

        <div class="water-mark">
            <p>Created By <span>Soumyaranjan</span> ©2026</p>
        </div>
    </div>

    <script src="./Js/normal.js"></script>
</body>

</html>
